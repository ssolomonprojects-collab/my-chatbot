  <title>EduBot - College Guide</title>

<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>🎓 EduBot</h1>
      <p>Your Personal College Guide Assistant</p>
    </div>
    <div class="chat-window" id="chatWindow"></div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Ask me anything about college life..." autocomplete="off">
